<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dipindahin.id — System Build 01+02</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&family=Bricolage+Grotesque:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080F;--bg2:#0A0E1A;--bg3:#0E1424;--bg4:#131A2E;
  --blue:#1B3FE4;--blueL:#3557FF;--blueXL:#6B8AFF;--blueT:rgba(27,63,228,.12);
  --gold:#E8B830;--goldL:#F5CC50;--goldT:rgba(232,184,48,.1);
  --green:#00C878;--greenD:#009A5C;--greenT:rgba(0,200,120,.1);
  --red:#F03050;--redT:rgba(240,48,80,.1);
  --purple:#A855F7;--purpleT:rgba(168,85,247,.1);
  --orange:#F08028;--orangeT:rgba(240,128,40,.1);
  --cyan:#10B8D8;--cyanT:rgba(16,184,216,.1);
  --white:#FFF;--off:#F0F4FF;
  --muted:#6070A0;--mutedL:#8090B8;--mutedXL:#B0BCD8;
  --border:rgba(255,255,255,.065);--borderB:rgba(255,255,255,.12);
  --r:10px;--r-sm:6px;--r-lg:16px;--r-xl:22px;
  --font-display:'Bricolage Grotesque',sans-serif;
  --font-mono:'Geist Mono',monospace;
}

html{scroll-behavior:smooth}
body{font-family:var(--font-display);background:var(--bg);color:var(--white);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--blue);border-radius:2px}

/* ── LAYOUT ── */
.shell{display:flex;min-height:100vh}
.sidebar{
  width:260px;flex-shrink:0;background:var(--bg2);
  border-right:1px solid var(--border);
  position:fixed;top:0;left:0;height:100vh;
  display:flex;flex-direction:column;overflow-y:auto;
  z-index:50;
}
.main{margin-left:260px;flex:1;display:flex;flex-direction:column}
.topbar{
  height:58px;display:flex;align-items:center;
  padding:0 28px;border-bottom:1px solid var(--border);
  background:rgba(6,8,15,.9);backdrop-filter:blur(14px);
  position:sticky;top:0;z-index:40;gap:12px;
}

/* ── SIDEBAR ── */
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border)}
.sb-logomark{
  width:34px;height:34px;border-radius:8px;
  background:var(--gold);display:inline-flex;
  align-items:center;justify-content:center;
  font-family:var(--font-mono);font-weight:700;font-size:13px;
  color:var(--bg);margin-bottom:8px;
}
.sb-name{font-size:17px;font-weight:800;letter-spacing:-.3px}
.sb-tag{
  font-family:var(--font-mono);font-size:9px;
  letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:2px;
}
.sb-section{
  padding:16px 20px 6px;
  font-family:var(--font-mono);font-size:9px;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);
}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;margin:1px 8px;border-radius:var(--r-sm);
  font-size:13px;font-weight:600;color:var(--mutedL);
  cursor:pointer;transition:all .2s;
}
.sb-item:hover{background:var(--bg3);color:var(--white)}
.sb-item.active{
  background:linear-gradient(135deg,var(--blueT),rgba(27,63,228,.06));
  color:var(--white);border:1px solid rgba(27,63,228,.25);
}
.sb-item .ico{font-size:15px;width:18px;text-align:center}
.sb-badge{
  margin-left:auto;background:var(--red);color:var(--white);
  font-size:9px;font-weight:800;padding:2px 6px;border-radius:8px;
  font-family:var(--font-mono);
}
.sb-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border)}
.sb-build{
  padding:10px 14px;border-radius:var(--r-sm);
  background:var(--blueT);border:1px solid rgba(27,63,228,.3);
  font-size:12px;font-weight:600;color:var(--blueXL);line-height:1.5;
}
.sb-build strong{color:var(--white);display:block;margin-bottom:2px}

/* ── TOPBAR ── */
.tb-title{font-size:16px;font-weight:700;flex:1}
.tb-btn{
  display:flex;align-items:center;gap:7px;
  padding:7px 14px;border-radius:var(--r-sm);
  font-size:12px;font-weight:700;cursor:pointer;
  border:none;font-family:var(--font-display);transition:all .2s;
}
.tb-primary{background:var(--blue);color:var(--white)}
.tb-primary:hover{background:var(--blueL);transform:translateY(-1px);box-shadow:0 4px 16px rgba(27,63,228,.4)}
.tb-ghost{background:var(--bg3);color:var(--mutedL);border:1px solid var(--border)}
.tb-ghost:hover{color:var(--white);border-color:var(--borderB)}

/* ── PAGES ── */
.page{display:none;padding:28px;animation:fadeP .3s ease}
.page.active{display:block}
@keyframes fadeP{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── CARDS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:22px;
  transition:all .25s;
}
.card:hover{border-color:var(--borderB);transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,0,0,.4)}
.card-accent{position:relative;overflow:hidden}
.card-accent::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--blue))}

/* ── KPI ── */
.kpi-val{font-size:30px;font-weight:800;font-family:var(--font-mono);margin-bottom:4px}
.kpi-lbl{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:8px}
.kpi-delta{font-size:11px;font-weight:700}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{
  padding:10px 14px;text-align:left;
  font-family:var(--font-mono);font-size:9px;
  letter-spacing:2px;text-transform:uppercase;color:var(--muted);
  border-bottom:1px solid var(--border);
}
.tbl td{
  padding:13px 14px;font-size:13px;
  border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle;
}
.tbl tr:hover td{background:rgba(255,255,255,.015);cursor:pointer}
.tbl tr:last-child td{border:none}

/* ── STATUS BADGES ── */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:100px;
  font-family:var(--font-mono);font-size:10px;font-weight:600;
}
.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.s-baru{background:var(--goldT);color:var(--gold)}
.s-survey{background:var(--blueT);color:var(--blueXL)}
.s-konfirm{background:var(--greenT);color:var(--green)}
.s-jalan{background:var(--purpleT);color:var(--purple)}
.s-selesai{background:rgba(100,110,150,.15);color:var(--mutedL)}
.s-batal{background:var(--redT);color:var(--red)}
.pkg-basic{background:rgba(100,110,150,.15);color:var(--mutedXL);font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--font-mono);font-weight:600}
.pkg-standard{background:var(--blueT);color:var(--blueXL);font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--font-mono);font-weight:600}
.pkg-premium{background:var(--goldT);color:var(--gold);font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--font-mono);font-weight:600}
.pkg-intercity{background:var(--greenT);color:var(--green);font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--font-mono);font-weight:600}
.pkg-b2b{background:var(--orangeT);color:var(--orange);font-size:10px;padding:2px 8px;border-radius:4px;font-family:var(--font-mono);font-weight:600}

/* ── FORMS ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
.flbl{font-family:var(--font-mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block;font-weight:500}
.finp{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:10px 13px;color:var(--white);
  font-size:13px;font-family:var(--font-display);outline:none;transition:border .2s;
}
.finp:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(27,63,228,.2)}
.finp::placeholder{color:var(--muted)}
select.finp option{background:var(--bg2)}
textarea.finp{resize:vertical;min-height:72px}

/* ── PKG SELECTOR ── */
.pkg-sel{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:8px}
.pkg-opt{
  border:2px solid var(--border);border-radius:var(--r);
  padding:14px 10px;text-align:center;cursor:pointer;
  transition:all .2s;background:var(--bg3);
}
.pkg-opt:hover{border-color:var(--borderB)}
.pkg-opt.sel{border-color:var(--blue);background:var(--blueT)}
.pkg-emoji{font-size:22px;display:block;margin-bottom:6px}
.pkg-nm{font-size:11px;font-weight:800;margin-bottom:3px;letter-spacing:.5px}
.pkg-pr{font-size:10px;color:var(--green);font-weight:600;font-family:var(--font-mono)}

/* ── ADDON ── */
.addon-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--r-sm);
  border:1px solid var(--border);cursor:pointer;transition:all .2s;
  background:var(--bg3);margin-bottom:7px;
}
.addon-item.sel{border-color:var(--blue);background:var(--blueT)}
.addon-box{
  width:18px;height:18px;border-radius:4px;
  border:2px solid var(--muted);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;transition:all .2s;
}
.addon-item.sel .addon-box{background:var(--blue);border-color:var(--blue);color:var(--white)}
.addon-lbl{flex:1;font-size:13px;font-weight:500}
.addon-price{font-family:var(--font-mono);font-size:11px;color:var(--green);font-weight:600}

/* ── AI QUOTE ── */
.quote-box{
  background:linear-gradient(135deg,var(--blueT),rgba(27,63,228,.04));
  border:1px solid rgba(27,63,228,.25);border-radius:var(--r-lg);
  padding:22px;margin-top:18px;
}
.q-loading{display:flex;align-items:center;gap:10px;color:var(--mutedL);font-size:13px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.q-total{font-family:var(--font-mono);font-size:32px;font-weight:700;color:var(--gold);margin:6px 0}
.q-line{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.q-line:last-child{border:none;font-weight:700;font-size:13px;padding-top:10px}
.q-lbl{color:var(--mutedL)}

/* ── STEP INDICATOR ── */
.steps-wrap{display:flex;align-items:center;margin-bottom:24px}
.step-el{display:flex;flex-direction:column;align-items:center;gap:5px}
.step-c{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;transition:all .3s;font-family:var(--font-mono);
}
.step-done{background:var(--green);color:var(--white)}
.step-cur{background:var(--blue);color:var(--white);box-shadow:0 0 0 4px rgba(27,63,228,.2)}
.step-fut{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
.step-lbl{font-size:10px;font-weight:600;white-space:nowrap}
.step-done-lbl{color:var(--green)}.step-cur-lbl{color:var(--white)}.step-fut-lbl{color:var(--muted)}
.step-line{flex:1;height:2px;background:var(--border);margin:0 6px;margin-bottom:18px;transition:background .3s;min-width:20px}
.step-line-done{background:var(--green)}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(5px);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r-xl);padding:28px;
  width:100%;max-width:560px;max-height:90vh;overflow-y:auto;
  animation:modalIn .3s cubic-bezier(.34,1.56,.64,1);position:relative;
}
@keyframes modalIn{from{opacity:0;transform:scale(.9) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-close{
  position:absolute;top:18px;right:18px;width:30px;height:30px;
  border-radius:50%;background:var(--bg3);display:flex;align-items:center;
  justify-content:center;font-size:14px;color:var(--mutedL);cursor:pointer;border:none;
  transition:all .2s;
}
.modal-close:hover{background:var(--bg4);color:var(--white)}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.det-item{background:var(--bg3);border-radius:var(--r-sm);padding:12px}
.det-l{font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.det-v{font-size:13px;font-weight:600}
.act-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.act-btn{
  flex:1;min-width:110px;padding:10px 14px;border-radius:var(--r-sm);
  font-size:12px;font-weight:700;cursor:pointer;border:none;
  font-family:var(--font-display);text-align:center;transition:all .2s;
}
.act-pr{background:var(--blue);color:var(--white)}
.act-pr:hover{background:var(--blueL)}
.act-ok{background:rgba(0,200,120,.12);color:var(--green);border:1px solid rgba(0,200,120,.25)}
.act-ok:hover{background:rgba(0,200,120,.2)}
.act-dn{background:var(--redT);color:var(--red);border:1px solid rgba(240,48,80,.25)}
.act-dn:hover{background:rgba(240,48,80,.2)}

/* ── SETUP GUIDE ── */
.guide-step{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r-lg);margin-bottom:14px;overflow:hidden;
}
.guide-hdr{
  padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:background .2s;
}
.guide-hdr:hover{background:var(--bg3)}
.guide-num{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:12px;font-weight:700;
  flex-shrink:0;
}
.guide-title{font-size:15px;font-weight:700;flex:1}
.guide-time{font-family:var(--font-mono);font-size:10px;color:var(--muted)}
.guide-body{
  padding:0 20px;max-height:0;overflow:hidden;
  transition:max-height .3s ease,padding .3s ease;
}
.guide-body.open{max-height:2000px;padding:0 20px 20px}
.guide-body pre{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:14px;
  font-family:var(--font-mono);font-size:11.5px;
  overflow-x:auto;line-height:1.6;margin:10px 0;
  color:var(--mutedXL);
}
.guide-body pre .kw{color:var(--blueXL)}
.guide-body pre .str{color:var(--gold)}
.guide-body pre .cm{color:var(--muted)}
.guide-body pre .fn{color:var(--green)}
.cpy-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:var(--r-sm);
  background:var(--bg4);border:1px solid var(--border);
  font-family:var(--font-mono);font-size:10px;font-weight:600;
  color:var(--mutedL);cursor:pointer;margin-top:6px;transition:all .2s;
}
.cpy-btn:hover{color:var(--white);border-color:var(--borderB)}
.info-box{
  padding:12px 14px;border-radius:var(--r-sm);
  font-size:13px;line-height:1.65;margin:10px 0;
}
.info-blue{background:var(--blueT);border:1px solid rgba(27,63,228,.2);color:var(--blueXL)}
.info-gold{background:var(--goldT);border:1px solid rgba(232,184,48,.2);color:var(--gold)}
.info-green{background:var(--greenT);border:1px solid rgba(0,200,120,.2);color:var(--green)}
.check-list{list-style:none;display:flex;flex-direction:column;gap:6px;margin:10px 0}
.check-list li{display:flex;gap:8px;font-size:13px;color:var(--mutedXL);align-items:flex-start;line-height:1.5}
.check-list li::before{content:'→';color:var(--gold);flex-shrink:0;font-weight:700;margin-top:1px}

/* ── MINI CHART ── */
.bar-wrap{display:flex;align-items:flex-end;gap:5px;height:72px;margin-top:14px}
.bar-item{flex:1;border-radius:3px 3px 0 0;background:var(--blue);opacity:.7;transition:opacity .2s;cursor:pointer;position:relative}
.bar-item:hover{opacity:1}
.bar-item.hi{background:var(--gold);opacity:1}
.bar-lbl{display:flex;gap:5px;margin-top:5px}
.bar-lbl-item{flex:1;font-family:var(--font-mono);font-size:8px;text-align:center;color:var(--muted)}

/* ── WA TEMPLATES ── */
.wa-msg{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;margin-bottom:12px;
  position:relative;
}
.wa-msg::before{
  content:'';position:absolute;left:-8px;top:16px;
  width:0;height:0;border-top:8px solid transparent;
  border-bottom:8px solid transparent;
  border-right:8px solid var(--bg3);
}
.wa-name{font-family:var(--font-mono);font-size:10px;color:var(--green);font-weight:700;margin-bottom:8px;letter-spacing:1px}
.wa-text{font-size:13px;line-height:1.7;color:var(--mutedXL);white-space:pre-line}
.wa-var{color:var(--gold);font-weight:700}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:22px;right:22px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:12px 18px;
  font-size:13px;font-weight:600;z-index:1000;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 16px 48px rgba(0,0,0,.5);
  transform:translateY(80px);opacity:0;
  transition:all .4s cubic-bezier(.34,1.56,.64,1);
  max-width:300px;
}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:rgba(0,200,120,.35)}
.toast.err{border-color:rgba(240,48,80,.35)}

@media(max-width:860px){
  .sidebar{transform:translateX(-100%)}
  .main{margin-left:0}
  .grid-4,.grid-3,.grid-2{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .pkg-sel{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast">
  <span id="toast-icon">✅</span>
  <span id="toast-msg">Berhasil!</span>
</div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── GOOGLE SHEETS CONFIG ─────────────────────────────
const SHEET_ID = '1qCKkFRPHbPmIFeE93AhGtB75FH5RwENu0CJc97TWH9E';
const SHEET_NAME = 'Sheet1';
const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${SHEET_NAME}`;

// Parse CSV ke array of objects
const parseCSV = (csv) => {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) return [];
  // Skip header (baris 1)
  return lines.slice(1).map(line => {
    // Handle quoted fields
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += line[i]; }
    }
    cols.push(cur.trim());
    return {
      id:      cols[0]  || '',
      name:    cols[1]  || '',
      phone:   cols[2]  || '',
      from:    cols[3]  || '',
      to:      cols[4]  || '',
      date:    cols[5]  || '',
      pkg:     cols[6]  || '',
      price:   Number(cols[7])  || 0,
      dp:      Number(cols[8])  || 0,
      status:  cols[9]  || 'Baru',
      notes:   cols[10] || '',
      addons:  cols[11] ? cols[11].split(',') : [],
      created: cols[12] || '',
    };
  }).filter(r => r.id); // skip baris kosong
};

// ── FORMAT HELPERS ──────────────────────────────────
const fRp = n => {
  if (!n) return 'Rp 0';
  if (n >= 1000000) return `Rp ${(n/1000000).toFixed(1).replace('.0','')}jt`;
  return `Rp ${Number(n).toLocaleString('id-ID')}`;
};
const fDate = d => {
  if (!d) return '—';
  return new Date(d + 'T00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
};
const now = () => new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
const toast = (msg, type='ok') => {
  const t = document.getElementById('toast');
  document.getElementById('toast-icon').textContent = type === 'ok' ? '✅' : '❌';
  document.getElementById('toast-msg').textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => { t.className = `toast ${type}`; }, 3000);
};

function BookingPage({step,setStep,data,setData,pkg,setPkg,addons,setAddons,addonsTotal,setAddonsTotal,quote,setQuote,quoteLoading,setQuoteLoading,setOrders,orders,go}) {
  const addonList = [
    {name:'Packing Material Lengkap',price:150000},
    {name:'Bongkar Pasang Furnitur',price:200000},
    {name:'Asuransi Cargo',price:100000},
    {name:'Titip Sementara (1 bulan)',price:400000},
  ];
  const pkgs = [
    {name:'Basic',emoji:'📦',price:'Rp 550–800rb'},
    {name:'Standard',emoji:'🚛',price:'Rp 900rb–1,8jt'},
    {name:'Premium',emoji:'⭐',price:'Rp 1,8–3,5jt'},
    {name:'Intercity',emoji:'🗺️',price:'Rp 2,5–5,5jt'},
  ];

  const toggleAddon = (name, price) => {
    const has = addons.includes(name);
    setAddons(has ? addons.filter(a=>a!==name) : [...addons, name]);
    setAddonsTotal(has ? addonsTotal - price : addonsTotal + price);
  };

  const next = (s) => {
    if (s === 1) {
      if (!data.name || !data.phone || !data.from || !data.to || !data.date) {
        toast('Lengkapi semua field wajib', 'err'); return;
      }
    }
    setStep(s + 1);
  };

  const generateQuote = async () => {
    setQuoteLoading(true); setQuote(null);
    const pkgBase = {Basic:650000,Standard:1100000,Premium:2200000,Intercity:3000000};
    const distMul = {'<5km':1,'5-15km':1.25,'15-30km':1.5,'>30km':2.2};
    const typeMul = {kost:.8,'1kt':1,'2kt':1.3,'3kt':1.6,'3kt+':2,kantor:2.2};
    const prompt = `Kamu pricing engine untuk dipindahin.id Sukabumi. Hitung harga untuk:
Paket: ${pkg}, Tipe: ${data.type||'2kt'}, Jarak: ${data.dist||'5-15km'}, Furnitur: ${data.furniture||'sedikit'}, Fragile: ${data.fragile||'tidak'}, Add-on: ${addons.join(', ')||'tidak ada'}
Harga referensi: Basic Rp550-800rb, Standard Rp900rb-1.8jt, Premium Rp1.8-3.5jt, Intercity Rp2.5-5.5jt.
Response HANYA JSON: {"total":1200000,"breakdown":[{"label":"Paket Standard","amount":1000000},{"label":"Add-on","amount":200000},{"label":"Total","amount":1200000}],"notes":"Estimasi sebelum survey"}`;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:prompt}]})
      });
      const d = await res.json();
      const text = (d.content?.[0]?.text||'').replace(/```json?|```/g,'').trim();
      setQuote(JSON.parse(text));
    } catch {
      const base = pkgBase[pkg]||1000000;
      const dm = distMul[data.dist||'5-15km']||1.25;
      const tm = typeMul[data.type||'2kt']||1;
      const total = Math.round(base*dm*tm/50000)*50000 + addonsTotal;
      setQuote({total,breakdown:[{label:`Paket ${pkg}`,amount:Math.round(base*dm*tm/50000)*50000},{label:'Add-on',amount:addonsTotal},{label:'Total',amount:total}],notes:'Estimasi lokal'});
    }
    setQuoteLoading(false);
  };

  const submit = async () => {
    const newOrder = {
      id:'DP' + Date.now().toString().slice(-6),
      name:data.name, phone:data.phone, from:data.from, to:data.to,
      date:data.date, pkg, price:quote?.total||1000000,
      dp:Math.round((quote?.total||1000000)*0.5),
      status:'Baru', notes:data.notes||'', addons,
      created:new Date().toISOString().split('T')[0],
    };
    try {
      // Simpan ke Google Sheets via API publik
      const row = [
        newOrder.id, newOrder.name, newOrder.phone,
        newOrder.from, newOrder.to, newOrder.date,
        newOrder.pkg, newOrder.price, newOrder.dp,
        newOrder.status, newOrder.notes,
        newOrder.addons.join(','), newOrder.created
      ];
      // Kirim ke Google Sheets via Make.com webhook (sama seperti WA masuk)
      await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/values/Sheet1:append?valueInputOption=RAW`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [row] })
      }).catch(() => {}); // fail silently jika tidak ada auth
      setOrders(prev=>[newOrder,...prev]);
      toast(`Order ${newOrder.id} berhasil disimpan!`);
      setTimeout(()=>go('orders'),1000);
    } catch (err) {
      // Tetap tambah ke local state meski gagal ke Sheets
      setOrders(prev=>[newOrder,...prev]);
      toast(`Order ${newOrder.id} tersimpan lokal!`);
      setTimeout(()=>go('orders'),1000);
    }
  };

  const stepCfg = [{l:'Data Customer'},{l:'Detail Pindahan'},{l:'Paket & Harga'},{l:'Konfirmasi'}];

  return (
    <div className="page active">
      {/* Step indicator */}
      <div className="steps-wrap">
        {stepCfg.map((s,i)=>(
          <React.Fragment key={i}>
            <div className="step-el">
              <div className={`step-c ${i+1<step?'step-done':i+1===step?'step-cur':'step-fut'}`}>
                {i+1<step?'✓':i+1}
              </div>
              <div className={`step-lbl ${i+1<step?'step-done-lbl':i+1===step?'step-cur-lbl':'step-fut-lbl'}`}>{s.l}</div>
            </div>
            {i<3 && <div className={`step-line ${i+1<step?'step-line-done':''}`}/>}
          </React.Fragment>
        ))}
      </div>

      {/* Step 1 */}
      {step===1 && (
        <div className="card">
          <div className="form-grid">
            {[['name','Nama Lengkap *','Nama customer','text'],['phone','Nomor WhatsApp *','08xx-xxxx-xxxx','tel']].map(([k,l,p,t])=>(
              <div key={k} className="form-group">
                <label className="flbl">{l}</label>
                <input className="finp" type={t} placeholder={p} value={data[k]||''} onChange={e=>setData({...data,[k]:e.target.value})}/>
              </div>
            ))}
            <div className="form-group form-full">
              <label className="flbl">Alamat Asal *</label>
              <input className="finp" placeholder="Jl. ... No. ..., Kelurahan, Kecamatan, Sukabumi" value={data.from||''} onChange={e=>setData({...data,from:e.target.value})}/>
            </div>
            <div className="form-group form-full">
              <label className="flbl">Alamat Tujuan *</label>
              <input className="finp" placeholder="Jl. ... No. ..., Kota/Kabupaten" value={data.to||''} onChange={e=>setData({...data,to:e.target.value})}/>
            </div>
            <div className="form-group">
              <label className="flbl">Tanggal Pindah *</label>
              <input className="finp" type="date" value={data.date||''} onChange={e=>setData({...data,date:e.target.value})}/>
            </div>
            <div className="form-group">
              <label className="flbl">Waktu Mulai</label>
              <select className="finp" value={data.time||'07:00'} onChange={e=>setData({...data,time:e.target.value})}>
                {['07:00','08:00','09:00','13:00'].map(t=><option key={t}>{t} WIB</option>)}
              </select>
            </div>
          </div>
          <div style={{marginTop:18,display:'flex',justifyContent:'flex-end'}}>
            <button className="tb-btn tb-primary" onClick={()=>next(1)}>Lanjut →</button>
          </div>
        </div>
      )}

      {/* Step 2 */}
      {step===2 && (
        <div className="card">
          <div className="form-grid">
            {[
              ['type','Tipe Hunian',['kost','1kt','2kt','3kt','3kt+','kantor'],['Kost/Kamar','1 Kamar','2 Kamar','3 Kamar','4+ Kamar','Kantor/Ruko']],
              ['dist','Estimasi Jarak',['<5km','5-15km','15-30km','>30km'],['< 5 km','5–15 km','15–30 km','> 30 km (Intercity)']],

function OrderModal({order:o, onClose, onStatus}) {
  const flow = ['Baru','Survey','Konfirmasi','Jalan','Selesai'];
  const ci = flow.indexOf(o.status);
  const next = ci < flow.length-1 ? flow[ci+1] : null;
  const [showWA, setShowWA] = React.useState(false);
  const [waMsg, setWaMsg] = React.useState(`Halo ${o.name}! 👋 Ini dari dipindahin.id.\n\nKami konfirmasi order pindahan Anda:\n📦 Paket: ${o.pkg}\n📅 Tanggal: ${fDate(o.date)}\n📍 Dari: ${o.from}\n📍 Ke: ${o.to}\n\nAda yang bisa kami bantu?`);
  const [sending, setSending] = React.useState(false);

  const FONNTE_TOKEN = 'CjQHYiJsuC6xSpCWYUqy';

  const sendWA = async () => {
    const phone = o.phone.replace(/\D/g,'').replace(/^0/,'62');
    setSending(true);
    try {
      const res = await fetch('https://api.fonnte.com/send', {
        method: 'POST',
        headers: {
          'Authorization': FONNTE_TOKEN,
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: new URLSearchParams({ target: phone, message: waMsg }),
      });
      const data = await res.json();
      if (data.status) {
        toast(`✅ WA terkirim ke ${o.name} via nomor bisnis!`);
        setShowWA(false);
      } else {
        toast('Gagal kirim WA: ' + (data.reason||'unknown'), 'err');
      }
    } catch(err) {
      toast('Error: ' + err.message, 'err');
    }
    setSending(false);
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <button className="modal-close" onClick={onClose}>✕</button>
        <div style={{fontSize:18,fontWeight:800,marginBottom:2}}>{o.id} · {o.name}</div>
        <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>{fDate(o.date)} · <StatusBadge s={o.status}/></div>
        <div className="det-grid">
          {[['WA',o.phone],['Paket',o.pkg],['Harga',fRp(o.price)],['DP',fRp(o.dp)]].map(([l,v])=>(
            <div key={l} className="det-item"><div className="det-l">{l}</div><div className="det-v">{v}</div></div>
          ))}
          <div className="det-item" style={{gridColumn:'1/-1'}}><div className="det-l">Dari</div><div className="det-v" style={{fontSize:12}}>{o.from}</div></div>
          <div className="det-item" style={{gridColumn:'1/-1'}}><div className="det-l">Ke</div><div className="det-v" style={{fontSize:12}}>{o.to}</div></div>
          {o.notes&&<div className="det-item" style={{gridColumn:'1/-1'}}><div className="det-l">Catatan</div><div className="det-v" style={{fontSize:12}}>{o.notes}</div></div>}
          {o.addons?.length>0&&<div className="det-item" style={{gridColumn:'1/-1'}}><div className="det-l">Add-on</div><div className="det-v" style={{fontSize:12}}>{o.addons.join(', ')}</div></div>}
        </div>

        {showWA && (
          <div style={{marginTop:14,background:'var(--bg3)',borderRadius:'var(--r)',padding:14,border:'1px solid var(--border)'}}>
            <div style={{fontSize:10,fontFamily:'var(--font-mono)',letterSpacing:2,color:'var(--muted)',marginBottom:8,textTransform:'uppercase'}}>
              Pesan WA → {o.phone} (via 085157942880)
            </div>
            <textarea
              style={{width:'100%',background:'var(--bg4)',border:'1px solid var(--border)',borderRadius:'var(--r-sm)',padding:'10px 12px',color:'var(--white)',fontSize:12,fontFamily:'var(--font-display)',resize:'vertical',minHeight:120,outline:'none',lineHeight:1.6}}
              value={waMsg}
              onChange={e=>setWaMsg(e.target.value)}
            />
            <div style={{display:'flex',gap:8,marginTop:10}}>
              <button className="act-btn act-ok" style={{flex:1}} onClick={sendWA} disabled={sending}>
                {sending ? '⏳ Mengirim...' : '📤 Kirim via WA Bisnis'}
              </button>
              <button className="act-btn act-dn" onClick={()=>setShowWA(false)}>Batal</button>
            </div>
          </div>
        )}

        <div className="act-row">
          {next&&<button className="act-btn act-ok" onClick={()=>onStatus(o.id,next)}>→ {next}</button>}
          <button className="act-btn act-pr" onClick={()=>setShowWA(!showWA)}>💬 {showWA ? 'Tutup WA' : 'Balas WA'}</button>
          <button className="act-btn act-dn" onClick={()=>onStatus(o.id,'Dibatalkan')}>✕ Batalkan</button>
        </div>
      </div>
    </div>
  );
}

function SchedulePage({orders, setModal}) {
  const days = ['MIN','SEN','SEL','RAB','KAM','JUM','SAB'];
  const orderDays = orders.map(o => parseInt(o.date?.split('-')[2]||0));
  return (
    <div className="page active">
      <div className="grid-2">
        <div>
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Kalender Mei 2026</div>
          <div className="card" style={{padding:16}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:6}}>
              {days.map(d=><div key={d} style={{textAlign:'center',fontSize:9,fontFamily:'var(--font-mono)',color:'var(--muted)',padding:'4px 0'}}>{d}</div>)}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
              {Array(5).fill(null).map((_,i)=><div key={i}/>)}
              {Array(31).fill(null).map((_,i)=>{
                const d = i+1;
                const ho = orderDays.includes(d);
                const isT = d===9;
                return (
                  <div key={d} style={{
                    aspectRatio:'1',display:'flex',flexDirection:'column',
                    alignItems:'center',justifyContent:'center',borderRadius:6,
                    background: isT ? 'var(--blueT)' : ho ? 'var(--goldT)' : 'var(--bg3)',
                    border: `1px solid ${isT?'rgba(27,63,228,.3)':ho?'rgba(232,184,48,.3)':'var(--border)'}`,
                    cursor:'default',fontSize:11,fontWeight:700,
                    color: isT ? 'var(--blueXL)' : ho ? 'var(--gold)' : 'var(--mutedL)',
                    transition:'all .2s',
                  }}>
                    {d}
                    {ho && <div style={{width:4,height:4,borderRadius:'50%',background:'var(--gold)',marginTop:2}}/>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
        <div>
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Order Minggu Ini (8–14 Mei)</div>
          {orders.filter(o=>{const d=parseInt(o.date?.split('-')[2]||0);return d>=8&&d<=14}).map(o=>(
            <div key={o.id} className="card" style={{marginBottom:10,cursor:'pointer'}} onClick={()=>setModal(o)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={{fontWeight:700,marginBottom:3}}>{o.name}</div>
                  <div style={{fontSize:11,color:'var(--muted)'}}>{fDate(o.date)}</div>
                  <div style={{fontSize:11,color:'var(--mutedL)',marginTop:3}}>{o.from.substring(0,40)}...</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <span className={`pkg-${o.pkg.toLowerCase()}`}>{o.pkg}</span>
                  <div style={{marginTop:5}}><StatusBadge s={o.status}/></div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// FINANCE
// ══════════════════════════════════════════════════════
function FinancePage({orders}) {
  const totalRev = orders.filter(o=>o.status==='Selesai'||o.status==='Konfirmasi').reduce((s,o)=>s+o.price,0);
  const totalDp  = orders.reduce((s,o)=>s+o.dp,0);
  const est_biaya = Math.round(totalRev * 0.63);
  const laba = totalRev - est_biaya;

  const pkgRev = ['Basic','Standard','Premium','Intercity','B2B'].map(p=>({
    pkg:p, rev:orders.filter(o=>o.pkg===p).reduce((s,o)=>s+o.price,0),
    count:orders.filter(o=>o.pkg===p).length
  }));

  return (
    <div className="page active">
      <div className="grid-4" style={{marginBottom:20}}>
        {[
          {val:fRp(totalRev),lbl:'Total Revenue Pipeline',c:'var(--green)'},
          {val:fRp(totalDp),lbl:'DP Sudah Masuk',c:'var(--blue)'},
          {val:fRp(est_biaya),lbl:'Est. Biaya (63%)',c:'var(--red)'},
          {val:fRp(laba),lbl:'Est. Laba Kotor',c:'var(--gold)'},
        ].map((k,i)=>(
          <div key={i} className="card">
            <div style={{fontSize:22,fontWeight:800,color:k.c,fontFamily:'var(--font-mono)',marginBottom:4}}>{k.val}</div>
            <div style={{fontSize:12,color:'var(--muted)'}}>{k.lbl}</div>
          </div>
        ))}
      </div>
      <div className="grid-2">
        <div className="card">
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Revenue per Paket</div>
          {pkgRev.map(({pkg,rev,count})=>(
            <div key={pkg} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
              <span className={`pkg-${pkg.toLowerCase()}`} style={{minWidth:72}}>{pkg}</span>
              <div style={{flex:1,height:5,background:'var(--bg3)',borderRadius:3,overflow:'hidden'}}>
                <div style={{height:'100%',background:'var(--blue)',width:`${totalRev>0?rev/totalRev*100:0}%`,borderRadius:3,transition:'width .8s ease'}}/>
              </div>
              <span style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--gold)',minWidth:70,textAlign:'right'}}>{fRp(rev)}</span>
              <span style={{fontSize:10,color:'var(--muted)',minWidth:30}}>({count})</span>
            </div>
          ))}
        </div>
        <div className="card">
          <div style={{fontSize:14,fontWeight:700,marginBottom:14}}>Estimasi Biaya Bulanan</div>
          {[
            ['Sewa Kendaraan','Rp 13,8jt','var(--red)'],
            ['SDM (Koordinator+Harian)','Rp 14,8jt','var(--red)'],
            ['Basecamp & Material','Rp 4,5jt','var(--orange)'],
            ['Marketing & Iklan','Rp 6,2jt','var(--orange)'],
            ['Lain-lain & Buffer','Rp 3,4jt','var(--muted)'],
          ].map(([l,v,c])=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>
              <span style={{color:'var(--mutedL)'}}>{l}</span>
              <span style={{fontFamily:'var(--font-mono)',fontWeight:700,color:c}}>{v}</span>
            </div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',padding:'12px 0',fontSize:14,fontWeight:800}}>
            <span>Total Opex/Bulan</span>
            <span style={{color:'var(--gold)',fontFamily:'var(--font-mono)'}}>Rp 42,7jt</span>
          </div>
        </div>
      </div>
    </div>
  );
}
